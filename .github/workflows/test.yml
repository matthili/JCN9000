name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies (ohne TensorFlow für schnelleren CI-Lauf)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v --tb=short

  spec-drift:
    name: Spec-Drift-Check (Generator-Output unverändert)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate spec
        run: |
          python -m scripts.generate_jass_rules_json
          python -m scripts.generate_encoding_fixtures

      - name: Fail bei Drift
        run: |
          if ! git diff --exit-code spec/; then
            echo ""
            echo "ERROR: spec/-Dateien sind nicht synchron mit dem Code."
            echo "Bitte lokal ausführen und commiten:"
            echo "  python -m scripts.generate_jass_rules_json"
            echo "  python -m scripts.generate_encoding_fixtures"
            exit 1
          fi

  lint-yaml:
    name: README- und Spec-Files vorhanden
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pflichtdateien prüfen
        run: |
          test -f README.md       || (echo "README.md fehlt"; exit 1)
          test -f LICENSE         || (echo "LICENSE fehlt"; exit 1)
          test -f pyproject.toml  || (echo "pyproject.toml fehlt"; exit 1)
          test -f .gitignore      || (echo ".gitignore fehlt"; exit 1)
          test -f spec/jass_rules.json        || (echo "spec/jass_rules.json fehlt"; exit 1)
          test -f spec/jass_rules.schema.json || (echo "spec/jass_rules.schema.json fehlt"; exit 1)
          test -f spec/state_encoding.md      || (echo "spec/state_encoding.md fehlt"; exit 1)
          test -f spec/fixtures/encoding_fixtures.json || (echo "Fixtures fehlen"; exit 1)
          echo "Alle Pflichtdateien vorhanden."
